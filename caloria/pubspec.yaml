name: caloria
description: AI destekli kalori ve beslenme takip uygulaması
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.11.5 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

dependencies:
  flutter_dotenv: ^5.1.0
  # UI
  cupertino_icons: ^1.0.6
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  fl_chart: ^0.69.0

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.0

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.3
  firebase_analytics: ^11.3.3
  firebase_crashlytics: ^4.1.3

  # Image
  image_picker: ^1.1.2
  image_cropper: ^8.0.2
  flutter_image_compress: ^2.3.0

  # Network
  dio: ^5.7.0

  # Code Generation
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Monetization
  google_mobile_ads: ^5.2.0
  purchases_flutter: ^8.2.1

  # Utils
  flutter_dotenv: ^5.1.0
  intl: ^0.19.0
  equatable: ^2.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.12
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.3

flutter:
  uses-material-design: true
  assets:
    - .env