name: caloria
description: AI destekli kalori ve beslenme takip uygulaması
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.11.5 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_dotenv: ^5.1.0

  cupertino_icons: ^1.0.6
  fl_chart: ^0.69.0

  flutter_riverpod: ^2.5.1

  go_router: ^14.2.0

  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_analytics: ^11.3.3
  firebase_crashlytics: ^4.1.3

  image_picker: ^1.1.2
  flutter_image_compress: ^2.3.0

  dio: ^5.7.0

  google_mobile_ads: ^5.2.0

  intl: ^0.19.0
  flutter_local_notifications: ^17.2.4
  timezone: ^0.9.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - admob_config.json
